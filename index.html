<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7. 게임 디자인 기초 (객체 지향 설계)</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
    --bg-void: #08090d;
    --bg-surface: #0e1019;
    --bg-elevated: #141722;
    --bg-card: #181c2a;
    --bg-glass: rgba(20, 23, 34, 0.75);
    --border-subtle: rgba(255,255,255,0.04);
    --border-dim: rgba(255,255,255,0.08);
    --border-accent: rgba(129,140,248,0.3);
    --text-primary: #eaedf3;
    --text-secondary: #8b95a8;
    --text-muted: #5a6478;
    --accent: #818cf8;
    --accent-glow: rgba(129,140,248,0.15);
    --accent-bright: #a5b4fc;
    --gold: #f0c040;
    --gold-dim: rgba(240,192,64,0.12);
    --green: #6ee7a0;
    --green-dim: rgba(110,231,160,0.1);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.1);
    --radius: 12px;
    --radius-sm: 8px;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg-void);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
}

/* 배경 그라디언트 앰비언트 */
body::before {
    content: '';
    position: fixed; inset: 0; z-index: -1;
    background:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(129,140,248,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(240,192,64,0.03) 0%, transparent 50%);
}

/* ========== 오디오 바 (Glass Morphism) ========== */
#audio-bar {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg-glass);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border-bottom: 1px solid var(--border-subtle);
    padding: 14px 24px;
}
#audio-controls {
    display: flex; align-items: center; gap: 14px;
    max-width: 860px; margin: 0 auto;
}
#play-btn {
    background: var(--accent);
    border: none; color: #fff;
    width: 40px; height: 40px; border-radius: 50%;
    cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px var(--accent-glow), 0 2px 8px rgba(0,0,0,0.3);
    transition: var(--transition);
    flex-shrink: 0;
}
#play-btn:hover {
    background: var(--accent-bright);
    transform: scale(1.08);
    box-shadow: 0 0 30px rgba(129,140,248,0.3), 0 4px 12px rgba(0,0,0,0.4);
}
.skip-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 32px; height: 32px; border-radius: 50%;
    cursor: pointer; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
    flex-shrink: 0;
}
.skip-btn:hover {
    background: var(--surface-hover);
    color: var(--text-primary);
}
#time-display {
    color: var(--text-muted); font-size: 12px;
    min-width: 90px; font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
}

/* 커스텀 시크바 */
#seek-bar {
    flex: 1; height: 4px;
    -webkit-appearance: none; appearance: none;
    background: var(--border-dim);
    border-radius: 2px; outline: none;
    cursor: pointer; transition: height 0.15s ease;
}
#seek-bar:hover { height: 6px; }
#seek-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
    cursor: pointer;
    transition: var(--transition);
}
#seek-bar::-webkit-slider-thumb:hover {
    transform: scale(1.3);
    box-shadow: 0 0 16px rgba(129,140,248,0.4);
}
#seek-bar::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%; border: none;
    background: var(--accent);
    cursor: pointer;
}

#speed-select {
    background: var(--bg-elevated); color: var(--text-secondary);
    border: 1px solid var(--border-dim);
    border-radius: 6px; padding: 5px 10px;
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    cursor: pointer; outline: none;
    transition: var(--transition);
}
#speed-select:hover { border-color: var(--accent); }

/* ========== 슬라이드 네비게이션 ========== */
#slide-nav {
    display: flex; gap: 3px; padding: 12px 24px;
    overflow-x: auto; background: var(--bg-surface);
    border-bottom: 1px solid var(--border-subtle);
    justify-content: center; flex-wrap: wrap;
    scrollbar-width: none;
}
#slide-nav::-webkit-scrollbar { display: none; }

.nav-dot {
    width: 34px; height: 30px; border-radius: 6px;
    border: 1px solid transparent; cursor: pointer;
    font-size: 11px; font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
    position: relative;
}
.nav-dot.has-audio {
    background: rgba(129,140,248,0.08); color: var(--accent);
    border-color: rgba(129,140,248,0.12);
}
.nav-dot.no-audio {
    background: rgba(255,255,255,0.02); color: var(--text-muted);
    opacity: 0.5;
}
.nav-dot:hover {
    opacity: 1;
    transform: translateY(-1px);
    border-color: var(--accent);
}
.nav-dot.active {
    background: var(--accent); color: #fff;
    transform: translateY(-2px) scale(1.05); opacity: 1;
    box-shadow: 0 4px 16px var(--accent-glow);
    border-color: transparent;
}

/* 슬라이드 전환 애니메이션 */
@keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
}
#slide-content {
    animation: slideIn 0.35s ease-out;
}

#slide-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
}
#slide-id {
    color: var(--accent); font-size: 11px; letter-spacing: 3px;
    font-weight: 500; text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
}
#slide-badge {
    font-size: 10px; padding: 3px 10px; border-radius: 20px;
    font-weight: 500; letter-spacing: 0.3px;
}
.badge-audio {
    background: var(--green-dim); color: var(--green);
    border: 1px solid rgba(110,231,160,0.15);
}
.badge-no-audio {
    background: var(--red-dim); color: var(--red);
    border: 1px solid rgba(248,113,113,0.12);
}

#slide-title {
    font-size: 26px; font-weight: 900; color: #fff;
    margin-bottom: 32px; line-height: 1.5;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border-dim);
    letter-spacing: -0.3px;
}

/* ========== 슬라이드 콘텐츠 블록 ========== */

.slide-text {
    color: var(--text-secondary); font-size: 14.5px;
    line-height: 2; margin-bottom: 20px;
    font-weight: 300;
}
.slide-text strong {
    color: var(--gold); font-weight: 500;
    background: var(--gold-dim);
    padding: 1px 5px; border-radius: 3px;
}
.slide-text em {
    color: var(--accent-bright); font-style: normal; font-weight: 400;
}

/* 인용 블록 */
.slide-quote {
    background: var(--bg-card);
    border-left: 2px solid var(--accent);
    padding: 18px 22px; margin-bottom: 16px;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    color: var(--text-primary); font-size: 14px;
    line-height: 1.85; font-weight: 300;
}
.slide-quote strong {
    color: var(--gold); font-weight: 500;
}

/* 포인트 리스트 */
.slide-points {
    list-style: none; margin-bottom: 20px; padding-left: 0;
    display: flex; flex-direction: column; gap: 6px;
}
.slide-points li {
    position: relative;
    padding: 12px 16px 12px 36px;
    background: var(--bg-elevated);
    border-radius: var(--radius-sm);
    font-size: 13.5px; line-height: 1.7;
    color: var(--text-secondary); font-weight: 300;
    border: 1px solid var(--border-subtle);
    transition: var(--transition);
}
.slide-points li:hover {
    border-color: var(--border-accent);
    background: var(--bg-card);
}
.slide-points li::before {
    content: '';
    position: absolute; left: 15px; top: 50%;
    transform: translateY(-50%);
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent-glow);
}
.slide-points li strong {
    color: var(--gold); font-weight: 500;
}

/* 노트 블록 (aside) */
.slide-note {
    display: flex; gap: 14px; align-items: flex-start;
    background: var(--bg-elevated);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius);
    padding: 18px 20px; margin-top: 28px;
    position: relative; overflow: hidden;
}
.slide-note::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--gold), var(--accent));
    opacity: 0.5;
}
.note-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
.note-content {
    color: var(--text-secondary); font-size: 13px;
    line-height: 1.8; font-weight: 300;
}
.note-content strong { color: var(--text-primary); font-weight: 500; }

/* 이미지 */
.slide-image {
    margin-bottom: 20px; text-align: center;
}
.slide-image img {
    max-width: 100%; border-radius: var(--radius);
    border: 1px solid var(--border-dim);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

/* ========== 정의 카드 (> **제목** 본문 패턴) ========== */
.slide-def-card {
    background: var(--bg-card);
    border-left: 2px solid var(--accent);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 18px 22px;
    margin-bottom: 12px;
    transition: var(--transition);
}
.slide-def-card:hover {
    border-left-color: var(--gold);
    background: rgba(24,28,42,0.9);
}
.def-title {
    color: var(--gold); font-size: 14.5px; font-weight: 700;
    margin-bottom: 8px; letter-spacing: 0.2px;
}
.def-desc {
    color: var(--text-secondary); font-size: 13.5px;
    line-height: 1.8; font-weight: 300;
}
.def-desc strong { color: var(--text-primary); font-weight: 500; }

/* ========== 섹션 카드 (**볼드 헤더** + 본문) ========== */
.slide-card {
    background: var(--bg-elevated);
    border-radius: var(--radius-sm);
    padding: 16px 20px;
    margin-bottom: 10px;
    border: 1px solid var(--border-subtle);
    transition: var(--transition);
}
.slide-card:hover {
    border-color: var(--border-accent);
    transform: translateX(3px);
}
.card-heading {
    color: var(--gold); font-size: 14px; font-weight: 700;
    margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
}
.card-heading::before {
    content: ''; display: inline-block;
    width: 3px; height: 14px;
    background: var(--accent); border-radius: 2px;
    flex-shrink: 0;
}
.card-desc {
    color: var(--text-secondary); font-size: 13px;
    line-height: 1.8; font-weight: 300;
    padding-left: 11px;
}
.card-desc strong { color: var(--text-primary); font-weight: 500; }
.card-desc em { color: var(--accent-bright); font-style: normal; }

/* ========== 오디오 구간 맵 (재생바 아래 타임라인) ========== */
#audio-map {
    max-width: 860px; margin: 8px auto 0;
    height: 26px;
    display: flex;
    gap: 1px;
    border-radius: 4px;
    overflow: hidden;
    background: var(--bg-elevated);
}
.map-segment {
    height: 100%;
    min-width: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    transition: filter 0.15s;
    overflow: hidden;
    white-space: nowrap;
    padding: 0 2px;
}
.map-segment:hover {
    filter: brightness(1.3);
    z-index: 1;
}
.map-segment.active {
    filter: brightness(1.4);
    color: #fff;
    font-weight: 700;
}
/* 구간별 색상 (순서대로 순환) — gap 요소 제외 */
.map-segment:nth-of-type(odd)  { background: rgba(129,140,248,0.35); }
.map-segment:nth-of-type(even) { background: rgba(240,192,64,0.25); }
.map-gap {
    height: 100%;
    background: var(--bg-elevated);
}

/* ========== 메인 레이아웃 (콘텐츠 + 인덱스) ========== */
#main-layout {
    display: flex;
    max-width: 1200px;
    margin: 0 auto;
}
#slide-area {
    flex: 1;
    min-width: 0;
}
#slide-container {
    max-width: 800px; margin: 0 auto;
    padding: 40px 28px 80px;
}

/* ========== 인덱스 패널 (우측 사이드바) ========== */
#index-panel {
    width: 240px;
    flex-shrink: 0;
    border-left: 1px solid var(--border-subtle);
    background: var(--bg-surface);
    position: sticky;
    top: 80px;
    height: calc(100vh - 80px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border-dim) transparent;
}
#index-panel::-webkit-scrollbar { width: 4px; }
#index-panel::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 2px; }

#index-header {
    padding: 16px 16px 10px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    border-bottom: 1px solid var(--border-subtle);
}

.index-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 8px 16px;
    cursor: pointer;
    transition: var(--transition);
    border-left: 2px solid transparent;
    font-size: 12px;
    line-height: 1.5;
}
.index-item:hover {
    background: var(--bg-elevated);
    border-left-color: var(--border-accent);
}
.index-item.active {
    background: var(--bg-card);
    border-left-color: var(--accent);
}
.index-item .idx-id {
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    flex-shrink: 0;
    min-width: 28px;
}
.index-item .idx-title {
    color: var(--text-secondary);
    font-weight: 300;
}
.index-item.active .idx-title {
    color: var(--text-primary);
    font-weight: 400;
}
.index-item.has-audio .idx-id::after {
    content: ' ♪';
    color: var(--green);
    font-size: 8px;
}

/* ========== 반응형 ========== */
@media (max-width: 900px) {
    #index-panel { display: none; }
    #main-layout { display: block; }
    #audio-map { margin-top: 12px; }
}
@media (max-width: 640px) {
    /* 오디오 바 */
    #audio-bar { padding: 10px 12px; }
    #audio-map { margin-top: 16px; }
    #audio-controls { gap: 6px; }
    #play-btn { width: 36px; height: 36px; font-size: 14px; }
    .skip-btn { width: 30px; height: 30px; font-size: 11px; }
    #time-display { min-width: 70px; font-size: 10px; }
    #speed-select { padding: 4px 6px; font-size: 10px; }

    /* 네비게이션 도트: 가로 스크롤 */
    #slide-nav {
        flex-wrap: nowrap;
        justify-content: flex-start;
        padding: 8px 12px;
        gap: 2px;
    }
    .nav-dot { width: 28px; height: 26px; font-size: 9px; flex-shrink: 0; }

    /* 슬라이드 영역 */
    #slide-container { padding: 20px 14px 80px; }
    #slide-title { font-size: 20px; margin-bottom: 20px; padding-bottom: 14px; }
    #slide-header { gap: 8px; margin-bottom: 8px; }
    #slide-id { font-size: 10px; }
    #slide-badge { font-size: 9px; padding: 2px 8px; }

    /* 콘텐츠 블록 */
    .slide-text { font-size: 13.5px; line-height: 1.9; }
    .slide-card { padding: 16px; }
    .slide-def-card { padding: 14px; }
    .slide-note { padding: 14px 16px; font-size: 12.5px; }
    .slide-points li { font-size: 13.5px; }
    .slide-image img { max-height: 50vh; }

    /* 자막 바 */
    #subtitle-bar { padding: 10px 14px; }
    #subtitle-text { font-size: 0.9rem; }
}

/* 자막 바 */
#subtitle-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    text-align: center;
    padding: 14px 24px;
    background: rgba(0, 0, 0, 0.82);
    z-index: 1000;
    pointer-events: none;
    min-height: 24px;
}

#subtitle-text {
    color: #f0f0f0;
    font-size: 1.05rem;
    line-height: 1.5;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.7);
    transition: opacity 0.15s ease;
}

#subtitle-bar:empty,
#subtitle-bar:has(#subtitle-text:empty) {
    opacity: 0;
}
/* ========== 모바일 목차 FAB + 오버레이 ========== */
#index-fab {
    display: none;
    position: fixed;
    bottom: 76px; right: 20px;
    z-index: 1100;
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 1px solid var(--border-dim);
    background: var(--bg-elevated);
    color: var(--text-secondary);
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    transition: var(--transition);
    align-items: center; justify-content: center;
}
#index-fab:hover {
    background: var(--accent);
    color: #fff;
    border-color: transparent;
}
@media (max-width: 900px) {
    #index-fab { display: flex; }
}

#index-overlay {
    display: none;
    position: fixed; inset: 0;
    z-index: 1200;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
}
#index-overlay.open { display: flex; justify-content: flex-end; }

#index-overlay-panel {
    width: min(320px, 85vw);
    height: 100%;
    background: var(--bg-surface);
    border-left: 1px solid var(--border-subtle);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border-dim) transparent;
    animation: slideInRight 0.25s ease-out;
}
@keyframes slideInRight {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
}
#index-overlay-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px;
    border-bottom: 1px solid var(--border-subtle);
}
#index-overlay-header span {
    font-size: 11px; font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
}
#index-overlay-close {
    background: transparent; border: none;
    color: var(--text-muted); font-size: 22px;
    cursor: pointer; padding: 4px 8px;
    border-radius: 6px;
    transition: var(--transition);
}
#index-overlay-close:hover {
    background: var(--bg-elevated); color: var(--text-primary);
}
#index-overlay-list .index-item {
    padding: 12px 16px;
}

</style>
</head>
<body>
<div id="app">
  <div id="audio-bar">
    <audio id="audio" src="베테랑_기획자의_객체_지향_게임_설계.m4a" preload="auto"></audio>
    <div id="audio-controls">
      <button class="skip-btn" onclick="skipTime(-10)">⏪</button>
      <button id="play-btn" onclick="togglePlay()">▶</button>
      <button class="skip-btn" onclick="skipTime(10)">⏩</button>
      <span id="time-display">0:00 / 0:00</span>
      <input type="range" id="seek-bar" min="0" max="86400" value="0" step="0.1">
      <select id="speed-select" onchange="changeSpeed(this.value)">
        <option value="0.75">0.75x</option>
        <option value="1" selected>1x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
      </select>
    </div>
    <div id="audio-map"></div>
  </div>
  <div id="slide-nav"></div>
  <div id="main-layout">
    <div id="slide-area">
      <div id="slide-container">
        <div id="slide-header">
          <span id="slide-id"></span>
          <span id="slide-badge"></span>
        </div>
        <h1 id="slide-title"></h1>
        <div id="slide-content"></div>
      </div>
    </div>
    <div id="index-panel">
      <div id="index-header">목차</div>
      <div id="index-list"></div>
    </div>

볼 수 있다<br>+하위 클래스 또는 객체가 상위 클래스의 속성과 행동을 모두 포함하고 있는 것을 ‘상속’이라 한다.</div></div>",

  {
    "id": "P4",
    "title": "객체 지향의 주요 개념",
    "content": "<div class=\"slide-text\">객체 지향 설계를 지탱하는 6가지 핵심 원리를 하나씩 살펴본다. → 핵심 원리이자 ‘현상’</div>\n<div class=\"slide-card\"><div class=\"card-heading\">추상화</div><div class=\"card-desc\">: 필요한 속성과 행동만 정의</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">다형성</div><div class=\"card-desc\">: 같은 메시지, 다른 응답 → 실습하는 유니티 잘 안씀</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">메시지 전송</div><div class=\"card-desc\">: 객체 간 소통 방식</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">상속</div><div class=\"card-desc\">: 상위 클래스의 특성을 물려받음 → 실습하는 유니티 잘 안씀</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">캡슐화</div><div class=\"card-desc\">: 내부 구현을 외부에 숨김</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">연관</div><div class=\"card-desc\">: 객체 사이의 관계 설정</div></div>",
    "hasAudio": true,
    "start": 260.0,
    "end": 290.0
  },
  {
    "id": "P5",
    "title": "추상화",
    "content": "<div class=\"slide-text\">필요로 하는 만큼의 속성과 행동만 정의하는 것이 추상화이다. 게임 세계를 기획한다는 것은 곧 속성과 행동을 정의하는 일이며, 어떤 게임이냐에 따라 그 범위가 달라진다.</div>\n<div class=\"slide-card\"><div class=\"card-heading\">MMORPG 몬스터</div><div class=\"card-desc\">HP, 드롭 아이템, 공격력, 움직인다, 죽는다</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">불필요한 정의</div><div class=\"card-desc\">나이, 취미, 학력, 삐진다, 공부한다</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">Ex)</div><div class=\"card-desc\">포유류와 동물의 속성과 행동을 따와서 분류하는 것은 “분류하는데 필요한” 속성과 행동을 추상화한 것이다.</div></div>\n<div class=\"slide-text\">클래스 디자인 = 클래스 추상화 → 객체 추상화</div>\n<div class=\"slide-note\"><div class=\"note-icon\">💡</div><div class=\"note-content\">적당한 추상화는 콘텐츠 구현의 자유도를 높이고 최적화를 돕는다. 시스템 디자인의 가장 중요한 요소중 하나이다.<br>모든 속성과 행동을 정의할 필요가 없기 때문에 추상화이다.</div></div>",
    "hasAudio": true,
    "start": 265.0,
    "end": 340.0
  },
  {
    "id": "P6",
    "title": "상속",
    "content": "<div class=\"slide-text\">하위 클래스는 상위 클래스의 속성과 행동을 물려받는다. 무기 상속 관계를 통해 이해해보자.</div>\n<div class=\"slide-text\"></div>\n<div class=\"slide-note\"><div class=\"note-icon\">💡</div><div class=\"note-content\">단검과 철퇴 모두 상위 클래시의 ‘<strong>데미지</strong>’라는 속성과 공격한다는 행동을 물려받지만, <strong>벤다</strong>는 검 계열만 상속받는다.</div></div>",
    "hasAudio": true,
    "start": 290.0,
    "end": 365.0
  },
  {
    "id": "P7",
    "title": "다형성 (Overloading)",
    "content": "<div class=\"slide-text\">같은 행동이라도 클래스마다 수행 방식이 다를 수 있다. 동일한 메시지에 서로 다른 방법으로 응답하는 기능이다. → 기능 보다는 나타날 수 있는 현상으로 이해하자!</div>\n<div class=\"slide-card\"><div class=\"card-heading\">칼</div><div class=\"card-desc\">: 칼을 꺼내어 찌른다 (공격)</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">철퇴</div><div class=\"card-desc\">: 철퇴를 휘둘러 내리친다 (공격)</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">총</div><div class=\"card-desc\">: 겨냥 후 방아쇠를 당긴다… 그런데 총알이 없다..? (공격)</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">Ex)</div><div class=\"card-desc\">먹는다 → 파스타를 말아먹는다, 스프를 떠먹는다, 빵을 찍어먹는다…</div></div>\n<div class=\"slide-note\"><div class=\"note-icon\">💡</div><div class=\"note-content\">3가지 무기는 모두 공격한다라는 명령으로 작동한다!</div></div>",
    "hasAudio": true,
    "start": 340.0,
    "end": 395.0
  },
  {
    "id": "P8",
    "title": "캡슐화 / 정보 은폐",
    "content": "<div class=\"slide-text\">객체는 자신의 오퍼레이션이 어떻게 작동하는지만 알고 있으며, 외부에서는 알 수 없다.</div>\n<div class=\"slide-text\">은행 업무 시 은행원의  개인사를 알 필요 없음<br>TV를 켤 떄 리모콘 동작 원리를 몰라도 된다.</div>\n<div class=\"slide-text\">→ <strong>중국어 상자!</strong>: 이 상자가 진짜 중국어를 아는지, 그저 따라하는건지는 상관 없다. 필요한건 그저 상자가 중국어를 출력할 수 있다는 기능만 알면 될 뿐!</div>\n<div class=\"slide-text\">변수 = 메모리에 할당된 방의 ‘주소’<br>→ 변수를 할당한다 = 메모리에 변수를 지정할 공간을 마련한다</div>\n<div class=\"slide-note\"><div class=\"note-icon\">💡</div><div class=\"note-content\">하나의 객체에 오류가 생겨도 다른 객체를 수정할 필요가 없다. 유지보수의 핵심 원리이자 캡슐화가 중요한 이유다.</div></div>",
    "hasAudio": true,
    "start": 395.0,
    "end": 445.0
  },
  {
    "id": "P9",
    "title": "메시지 전송",
    "content": "<div class=\"slide-text\">객체 간에는 서로 메시지를 전송하여 상호작용합니다.</div>\n<div class=\"slide-card\"><div class=\"card-heading\">리모콘</div><div class=\"card-desc\">: 메시지를 보낸다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">TV</div><div class=\"card-desc\">: 메시지를 받아 동작한다.</div></div>\n<div class=\"slide-note\"><div class=\"note-icon\">💡</div><div class=\"note-content\">절차 지향 주의에서는 객체간 값이 아닌 모든 값이 얹혀있기 때문에 상호작용보단 통짜로 연산된다!<br>하지만 객체 지향 주의는 각 객체가 고유한 속성 값을 가지기 때문에 통신을 통한 상호작용을 한다!</div></div>",
    "hasAudio": true,
    "start": 445.0,
    "end": 500.0
  },
  {
    "id": "P10",
    "title": "연관",
    "content": "<div class=\"slide-text\">한 객체는 다른 객체와 관계를 맺을 수 있으며, <strong>속성의 연관</strong>과 <strong>행동의 연관</strong> 두가지로 구분된다.</div>\n<div class=\"slide-def-card\"><div class=\"def-title\">복수의 연관</div><div class=\"def-desc\">객체는 다른 객체와 두 개 이상의 연관을 가질 수 있다.<br><strong>Ex)</strong> 힐러리는 클린턴의 아내이자 정치적 동지<br>→ 1 : 1 끼리 복수의 연관!</div></div>\n<div class=\"slide-def-card\"><div class=\"def-title\">다대상 연관</div><div class=\"def-desc\">객체는 하나 이상의 다른 객체와 연관을 가질 수 있다.<br><strong>Ex)</strong> 도끼로 몬스터를 죽이거나 나무를 팰 수 있다. → 1 : 多 연관!</div></div>",
    "hasAudio": true,
    "start": 497.0,

    "content": "<div class=\"slide-card\"><div class=\"card-heading\">다중성 연관</div><div class=\"card-desc\">선생-수업 = 1:1 선생- 학생 =1:多 연관으로 관계의 수량을 표현한다.</div></div>\n<div class=\"slide-text\">**집합 연관<br>한 객체가 여러 객체로 구성**된다.<br><strong>Ex)</strong> 농구팀은 농구선수들로 구성</div>\n<div class=\"slide-text\">상속과 혼동하기 쉬운 개념이다.</div>\n<div class=\"slide-card\"><div class=\"card-heading\">복합 연관</div><div class=\"card-desc\">구성 요소가 <strong>복합체 안에서만 존재</strong>하는 강력한 관계이다.</div></div>\n<div class=\"slide-card\"><div class=\"card-heading\">Ex)</div><div class=\"card-desc\">프로 농구팀은 반드시 프로 리그에 포함되지만, 선수는 팀 소속이 필수는 아니다.</div></div>\n<div class=\"slide-note\"><div class=\"note-icon\">💡</div><div class=\"note-content\">객체는 다른 객체와 연관을 맺기도 하지만 컴포넌트(부품)로써 존재할 수도 있다.<br>다른 객체와 연관 = 클래스<br>컴포넌트 존재 = 구성요소?<br>→ 객체 지향 설계에서 사용한 상속이 만능이라고 생각했지만 (사자+박쥐+뱀)과 같은 키메라같은 비현실적인 부류는 단일 클래스로 상속이 불가능 하기 때문에 이를 위해 나온 개념이 부품(컴포넌트)의 개념이다!<br><strong>객체 지향 설계방식</strong>과 <strong>컴포넌트 설계 방식</strong>은 아예 서로 다른 설계방식이다!</div></div>",

    "content": "<div class=\"slide-text\"></div>\n<ul class=\"slide-points\"><li><strong>클래스</strong> : 고블린</li><li><strong>속성</strong> : ID, 레벨, 모델링 리소스 ID, HP, 공격력, 방어력 등 → int, string 등으로 설정하는 변수</li><li><strong>행동</strong> : 이동, 근접 공격, 도망, 리스폰, 아이템 줍기 → int, string 등으로 설정하는 변수</li><li><strong>스테레오 타입</strong> : <<전투 관련>>, <<기타>>등으로 구분 → 구분(확인)용 주석</li><li><strong>책임</strong> : 저랩 유저용 기본 몬스터 3~5마리씩 떼를 지어 생성 → 특징, 특성 주석</li><li><strong>제약</strong> : {최소 레벨=1, 최대 레벨=20}</li><li><strong>노트</strong> : 고블린과 산적만의 도망 행동, 공격성 수치로 판단 →  메모용 주석</li></ul>\n<div class=\"slide-note\"><div class=\"note-icon\">💡</div><div class=\"note-content\"><strong>클래스 다이어그램의 용도</strong><br>클래스 다이어그램은 단순히 테이블을 설계하기 위한 청사진이 아니라, 완성된 테이블의 작동 방식을 프로그래머에게 전달하기 위한 ‘<strong>설명서</strong>’이므로, 테이블과 클래스 다이어그램은 서로 존재해야 한다!</div></div>",

const TRANSCRIPT = [{"start": 0.0, "end": 7.72, "text": "어 네. 화면 가득 몰려오는 막 수천마리의 몬스터 그리고 내 캐릭터가 무겁게 휘두르는 거대한 검"}, {"start": 7.72, "end": 10.68, "text": "뭐 땅에 굴러다니는 아주 작은 돌맹이 하나까지요."}, {"start": 10.68, "end": 12.540000000000001, "text": "네 정말 수많은 요소들이 있죠."}, {"start": 12.540000000000001, "end": 19.18, "text": "여러분은 방금 전까지도 스마트폰이나 PC로 게임을 하면서 이 거대한 세계를 누비고 오셨을 겁니다."}, {"start": 19.18, "end": 21.5, "text": "근데 문득 그런 생각해 본 적 없으신가요?"}, {"start": 21.5, "end": 22.76, "text": "어 어떤 생각이요?"}, {"start": 22.76, "end": 33.44, "text": "도대체 저 수많은 요소들이 어떻게 단 한 번의 충돌이나 오류도 없이 완벽한 하나의 우주처럼 딱 맞물려 돌아가고 있는 걸까 이런 궁금증 말이죠."}, {"start": 33.44, "end": 35.84, "text": "아 굉장히 날카로운 질문이네요."}, {"start": 35.84, "end": 38.64, "text": "사실 그 뒤에는 엄청난 설계가 숨어 있거든요."}, {"start": 38.64, "end": 44.68000000000001, "text": "네 오늘의 심층 탕구는 바로 이 거대한 의문표를 지어내는 아주 흥미로운 여정입니다."}, {"start": 44.68000000000001, "end": 52.0, "text": "여러분이 매일 즐기는 게임 속 세상 그 뼈대를 이루는 객체지향이라는 마법 같은 규칙을 한번 해체해 볼 텐데요."}, {"start": 52.0, "end": 58.44, "text": "맞습니다 오늘 우리가 파헤칠 자료는 현업에서 무려 10년간 굴은 베트남 게임 기획자가"}, {"start": 58.44, "end": 63.88, "text": "이제 막 입문하는 학생들을 위해 직접 작성한 아주 생생한 강의 노트입니다."}, {"start": 63.88, "end": 65.72, "text": "현장에 치열한 고민이 담겨있죠."}, {"start": 65.72, "end": 71.12, "text": "와 10년 차 현역 기획자의 비밀 노트라니 벌써부터 너무 기대가 되는데요."}, {"start": 71.12, "end": 76.52, "text": "저는 평소에 뭐 게임이라면 밤을 세워서라도 끝판왕을 깨야 직성이 풀리는 스타일이거든요."}, {"start": 76.52, "end": 78.44, "text": "전형적인 열혈 게이머시군요."}, {"start": 78.44, "end": 79.28, "text": "네 맞아요."}, {"start": 79.28, "end": 87.72, "text": "하지만 그 뒷단에서 벌어지는 기획이론은 완전 처음 접해보는 열정적인 입문자의 시선으로 이 시간에 이끌어갈 호스트입니다."}, {"start": 87.72, "end": 88.68, "text": "반갑습니다."}, {"start": 88.68, "end": 96.16, "text": "저는 오늘 그 복잡하고 오묘한 설계의 세계를 여러분이 단번에 이해하실 수 있도록 명확하게 짚어드릴 전문가 역할을 맡았습니다."}, {"start": 96.16, "end": 100.56, "text": "복잡한 설계이론을 실전 경험에 빗대어 확실하게 가이드해 드리겠습니다."}, {"start": 100.56, "end": 102.36, "text": "그럼 바로 들어가 보죠."}, {"start": 102.36, "end": 106.72, "text": "대체 이 복잡한 세계에 가장 밑바탕에는 무엇이 깔려 있는 건가요?"}, {"start": 106.72, "end": 107.84, "text": "아 잠깐만요."}, {"start": 107.84, "end": 110.16, "text": "그게 정확히 무슨 말이에요?"}, {"start": 110.16, "end": 117.48, "text": "게임 속 사물이라면 뭐 기사의 방패나 마법사의 칼 같은 건 알겠는데 눈에 안 보이는 곳도 객체가 될 수 있다고요?"}, {"start": 117.48, "end": 118.16, "text": "네."}, {"start": 118.16, "end": 121.08, "text": "바로 그게 제일 중요한 개벌 마인드인데요."}, {"start": 121.08, "end": 126.44, "text": "객체는 고유한 이름 같은 속성과 스스로 할 수 있는 행동으로 이루어집니다."}, {"start": 126.44, "end": 127.80000000000001, "text": "속성과 행동이요?"}, {"start": 127.80000000000001, "end": 128.48000000000002, "text": "네."}, {"start": 128.48000000000002, "end": 131.6, "text": "기획자의 노트에 아주 재밌는 사례가 있어요."}, {"start": 131.6, "end": 139.0, "text": "게임에서 불 위에 올려둔 고기가 익혀진다는 상태 변화조차 하나의 행동, 즉 하나의 객체로 본다는 겁니다."}, {"start": 139.0, "end": 141.79999999999998, "text": "아 익혀진다는 무형의 현상 그 자체를요?"}, {"start": 141.79999999999998, "end": 142.92, "text": "맞습니다."}, {"start": 142.92, "end": 151.72, "text": "법학의 리걸 마인드가 있듯이 현실의 원본에서 딱 필요한 속성과 행동만 뽑아내는 그런 마인드가 객체 지향의 첫 걸음입니다."}, {"start": 151.72, "end": 155.51999999999998, "text": "어? 필요한 속성과 행동만 뭉쳐놓은 덩어리군요."}, {"start": 155.51999999999998, "end": 159.88, "text": "그럼 이런 객체들을 매번 맨 땅에서 수작업으로 만들 수는 없을 텐데"}, {"start": 159.88, "end": 163.07999999999998, "text": "이걸 대량으로 찍어내는 틀 같은 건 어떻게 되는 건가요?"}, {"start": 163.07999999999998, "end": 171.48, "text": "클래스란 RPG의 마법사나 전사 같은 직업이 아니라 객체를 만들어내기 위해 개념 자체를 정의한 추상적인 설계도입니다."}, {"start": 171.48, "end": 172.92, "text": "설계도요?"}, {"start": 172.92, "end": 175.28, "text": "음... 그게 정확히 무슨 말이에요?"}, {"start": 175.28, "end": 178.92, "text": "약간 플라톤의 이대하나 시련자 같은 철학적인 느낌이 나는데요?"}, {"start": 178.92, "end": 181.24, "text": "철학적 개념이랑 아주 비슷해요."}, {"start": 181.24, "end": 185.32, "text": "자료에 나오는 게임 속 아이템인 에너지 드링크 캔을 예로 들어볼게요."}, {"start": 185.32, "end": 186.84, "text": "네. 에너지 드링크요?"}, {"start": 186.84, "end": 192.4, "text": "우리가 맵에 수많은 캔을 뿌리기 전에 먼저 캔이라는 최상위 분류의 설계도를 짭니다."}, {"start": 192.4, "end": 198.92000000000002, "text": "그 안에 명칭이나 섭취 효과 같은 속성 그리고 장전이나 획득 같은 행동을 미리 정의해두는 거죠."}, {"start": 198.92000000000002, "end": 201.8, "text": "아, 빈 양식처럼 미리 세팅해두는 거군요?"}, {"start": 201.8, "end": 206.84, "text": "그렇죠. 현실의 인간이라는 개념에서 구체적인 개인이 튀어나오듯"}, {"start": 206.84, "end": 212.4, "text": "캔이라는 보편자 설계도에서 실제 게임 속 캔 객체들이 찍혀나오는 겁니다."}, {"start": 212.4, "end": 216.8, "text": "붕어빵 틀처럼 미리 속성과 행동을 세팅해두는 거군요?"}, {"start": 216.8, "end": 224.36, "text": "그럼 이 설계도로 게임이라는 복잡한 세계를 구형할 때 꼭 지켜야 하는 핵심 원리들은 어떻게 되는 건가요?"}, {"start": 224.36, "end": 229.16000000000003, "text": "객체 지향을 지탱하는 첫 번째 현상인 추상화는 실제 하는 대상에서"}, {"start": 229.16000000000003, "end": 235.44, "text": "현재 게임에 딱 필요로 하는 만큼의 속성과 행동만 남기고 과감히 쳐내는 작업입니다."}, {"start": 235.44, "end": 237.92000000000002, "text": "필요한 만큼만 남긴 자구요?"}, {"start": 237.92000000000002, "end": 240.16000000000003, "text": "어, 그게 정확히 무슨 말이에요?"}, {"start": 240.16000000000003, "end": 245.64000000000001, "text": "오히려 디테일을 전부 다 넣어야 게임이 더 현실적이고 막 재밌어지는 거 아닌가요?"}, {"start": 245.67999999999998, "end": 248.55999999999997, "text": "그게 입문자들이 가장 많이 하는 오해거든요."}, {"start": 248.55999999999997, "end": 251.79999999999998, "text": "MMO RPG 몬스터를 기획한다고 생각해보세요."}, {"start": 251.79999999999998, "end": 261.91999999999996, "text": "체력이나 공격력, 드롭 아이템은 필수지만 이 몬스터의 나이나 취미, 학력, 심지어 삐진다 같은 행동은 전혀 시스템에 불필요한 정의입니다."}, {"start": 261.91999999999996, "end": 265.4, "text": "몬스터가 유저한테 맞고 삐지는 건 좀 웃기긴 하네요."}, {"start": 265.4, "end": 267.71999999999997, "text": "그렇죠. 시스템 용량만 잡아먹구요."}, {"start": 267.71999999999997, "end": 275.36, "text": "그렇게 불필요한 걸 쳐내는 적당한 추상화가 오히려 컨텐츠의 자유도를 높이고 시스템 최적화를 돕는 핵심입니다."}, {"start": 275.36, "end": 278.72, "text": "불필요한 곁가지를 잘라내는 게 핵심이군요."}, {"start": 278.72, "end": 284.72, "text": "그럼 이렇게 추상화로 잘 다듬어진 클래스들이 서로 특징을 막 주고받거나 물려주기도 하나요?"}, {"start": 284.72, "end": 286.16, "text": "그건 어떻게 되는 건가요?"}, {"start": 286.16, "end": 294.24, "text": "상속은 하위 클래스가 상위 클래스가 가진 고유한 속성과 행동을 그대로 물려받아 자신의 것으로 포함하는 원리입니다."}, {"start": 294.24, "end": 296.32, "text": "그대로 물려받는다고요?"}, {"start": 296.32, "end": 298.48, "text": "음... 그게 정확히 무슨 말이에요?"}, {"start": 298.48, "end": 303.40000000000003, "text": "제가 듣기로는 유니티 안진 같은 데서는 상속을 잘 안 쓴다고 들은 것 같은데요?"}, {"start": 303.4, "end": 307.47999999999996, "text": "어... 무기라는 상위 클래스의 사례를 보면 이해가 쉬운데요."}, {"start": 307.47999999999996, "end": 312.12, "text": "무기 클래스의 데미지라는 속성과 공격한다라는 행동이 있다고 해보죠."}, {"start": 312.12, "end": 314.12, "text": "네. 기본 무기의 특징이죠."}, {"start": 314.12, "end": 319.32, "text": "그럼 하위 클래스인 단검과 철퇴는 이걸 기본으로 알아서 상속받습니다."}, {"start": 319.32, "end": 324.88, "text": "기획자는 단검 클래스에만 뱀다는 특수한 행동 하나만 쏙 추가해주면 끝나는 거죠."}, {"start": 324.88, "end": 328.08, "text": "아... 1000번씩 따로 코딩할 필요가 없다는 거네요."}, {"start": 328.08, "end": 331.91999999999996, "text": "무기라는 공통된 부모의 특성을 이어받는 거군요."}, {"start": 331.96000000000004, "end": 335.44, "text": "그런데 똑같이 공격한다를 상속받았다고 해도"}, {"start": 335.44, "end": 339.04, "text": "칼이랑 총이 공격하는 방식은 완전히 겉보기에 다르잖아요."}, {"start": 339.04, "end": 340.24, "text": "그건 어떻게 되는 건가요?"}, {"start": 340.24, "end": 345.20000000000005, "text": "다형성은 동일한 명령을 받아도 객체가 기반해둔 속성에 따라"}, {"start": 345.20000000000005, "end": 348.20000000000005, "text": "서로 다른 방법으로 알아서 응답하는 현상입니다."}, {"start": 348.20000000000005, "end": 351.52000000000004, "text": "같은 명령인데 다르게 응답한다고요?"}, {"start": 351.52000000000004, "end": 353.96000000000004, "text": "어... 그게 정확히 무슨 말이에요?"}, {"start": 353.96000000000004, "end": 358.72, "text": "아까 부모가 시키는 대로 똑같이 물려받는 상속이랑은 정면으로 충돌하는 거 아닌가요?"}, {"start": 358.72, "end": 361.40000000000003, "text": "오려 상속을 완벽하게 보완해주죠."}, {"start": 361.4, "end": 364.88, "text": "플레이어가 공격이라는 단 하나의 명령을 내리면"}, {"start": 364.88, "end": 369.4, "text": "칼은 찌르고 철퇴는 내리치고 총은 방아쇠를 당깁니다."}, {"start": 369.4, "end": 372.59999999999997, "text": "호우스트! 무기마다 반응이 알아서 나가는군요."}, {"start": 372.59999999999997, "end": 375.76, "text": "네, 심지어 총알이 없다는 속성값이 있다면"}, {"start": 375.76, "end": 379.0, "text": "공격 명령에도 그냥 찰칵거리기만 하겠죠."}, {"start": 379.0, "end": 383.12, "text": "행동 너머에 속성에서 반응을 불러오는 오버로딩 현상입니다."}, {"start": 383.12, "end": 387.79999999999995, "text": "명령은 하나여도 각자 속성 사정에 맞게 알아서 움직이는 거군요."}, {"start": 387.8, "end": 391.16, "text": "그럼 이런 객체들 각자의 내부 사정이나 민감한 정보는"}, {"start": 391.16, "end": 394.24, "text": "밖에서 함부로 건드리지 못하게 보호해야 할 텐데"}, {"start": 394.24, "end": 395.40000000000003, "text": "그건 어떻게 되는 건가요?"}, {"start": 395.40000000000003, "end": 399.68, "text": "캡슐라는 객체가 자신의 기능 착동 방식만 스스로 알 뿐"}, {"start": 399.68, "end": 404.04, "text": "내부 구현 과정은 철저히 외부에 숨기는 정보 은폐 원리입니다."}, {"start": 404.04, "end": 407.6, "text": "외부에 숨긴다고요? 어? 그게 정확히 무슨 말이에요?"}, {"start": 407.6, "end": 409.92, "text": "부품끼리 서로 어떻게 돌아가는지 모르면"}, {"start": 409.92, "end": 412.28000000000003, "text": "게임 시스템이 막 엉키고 에러가 나지 않나요?"}, {"start": 412.28000000000003, "end": 415.56, "text": "철학의 중국어 상자 이론을 빌려 설명해 볼게요."}, {"start": 415.56, "end": 418.92, "text": "밖에서는 이 상자가 진짜 중국어를 아는지 아니면"}, {"start": 418.92, "end": 422.36, "text": "그냥 기계적으로 따라하는 건지 알 필요가 전혀 없거든요."}, {"start": 422.36, "end": 425.8, "text": "아, 그냥 결과물로 중국어가 나오기만 하면 된다는 거군요?"}, {"start": 425.8, "end": 430.2, "text": "맞습니다. 사용자는 중국어가 출력된다는 기능만 쓰면 되듯이"}, {"start": 430.2, "end": 434.32, "text": "내부 구현 과정을 꽁꽁 숨겨야 하나의 객체의 오류가 나도"}, {"start": 434.32, "end": 437.8, "text": "다른 객체까지 연세적으로 무너지는 걸 막을 수 있습니다."}, {"start": 437.8, "end": 442.84000000000003, "text": "철저한 분업과 비밀 유지가 오히려 전체 시스템을 안전하게 지켜주는군요."}, {"start": 442.84, "end": 446.44, "text": "그럼 이렇게 내부를 꽁꽁 숨긴 객체들끼리 협력하려면"}, {"start": 446.44, "end": 449.59999999999997, "text": "결국 대화는 해야 할 텐데 그건 어떻게 되는 건가요?"}, {"start": 449.59999999999997, "end": 454.08, "text": "객체 제왕에서는 모든 값이 한 번에 묶여 연산되는 과거의 절차 제왕과 날리"}, {"start": 454.08, "end": 457.52, "text": "객체 간에 서로 메세지를 전송하며 상호작용합니다."}, {"start": 457.52, "end": 461.79999999999995, "text": "메세지를 보낸다고요? 음... 그게 정확히 무슨 말이에요?"}, {"start": 461.79999999999995, "end": 465.84, "text": "게임 속 사물들끼리 단체 카톡방이라도 파서 대화한다는 건가요?"}, {"start": 465.84, "end": 467.88, "text": "본질적으로 메신저랑 비슷해요."}, {"start": 467.88, "end": 472.64, "text": "리모콘 객체가 TV 객체에게 켜지라는 텍스트 메세지를 툭 던지면"}, {"start": 472.64, "end": 476.36, "text": "TV가 그 메세지를 수신해서 스스로 화면을 켜는 구조입니다."}, {"start": 476.36, "end": 479.91999999999996, "text": "아, 하나로 엉켜있는 게 아니라 신호만 쏘는 거네요?"}, {"start": 479.91999999999996, "end": 484.36, "text": "네, 각 객체가 고유한 속성을 독립적으로 가지고 유지하면서"}, {"start": 484.36, "end": 487.0, "text": "통신만으로 유기적인 상호작용을 하는 거죠."}, {"start": 487.0, "end": 491.03999999999996, "text": "독립된 존재들이 통신을 통해 유기적으로 움직이는 거네요."}, {"start": 491.03999999999996, "end": 494.36, "text": "그럼 이렇게 통신하다 보면 필연적으로 엮이게 될 텐데"}, {"start": 494.36, "end": 497.76, "text": "객체들 사이에 복잡한 관계 설정은 어떻게 되는 건가요?"}, {"start": 497.76, "end": 500.88, "text": "연관은 한 객체가 다른 객체와 1대1,"}, {"start": 500.92, "end": 504.52, "text": "다중성 또는 집합 형태로 관계를 맺는 것이며"}, {"start": 504.52, "end": 509.08, "text": "때로는 객체 자체가 아예 다른 객체의 부품, 즉 컴포넌트가 되기도 합니다."}, {"start": 509.08, "end": 511.32, "text": "관계를 맺고 부품이 된다고요?"}, {"start": 511.32, "end": 513.72, "text": "잠깐만요, 그게 정확히 무슨 말이에요?"}, {"start": 513.72, "end": 516.24, "text": "아까 배운 상속으로 다 해결되는 거 아니었어요?"}, {"start": 516.24, "end": 521.4, "text": "사자, 박쥐, 배물 섞은 키메라 같은 귀귀한 괴물을 기획한다고 해보죠."}, {"start": 521.4, "end": 524.08, "text": "이걸 단일 플래스 상속만으로 만들려면"}, {"start": 524.08, "end": 527.32, "text": "시스템이 누구 특징을 따라야 할지 몰라 충돌이 일어납니다."}, {"start": 527.32, "end": 530.76, "text": "아, 부모가 셋이면 시스템 족보가 꼬여버리겠네요."}, {"start": 530.76, "end": 534.72, "text": "맞아요. 그래서 단일 상속만으로는 불가능하기 때문에"}, {"start": 534.72, "end": 539.4, "text": "객체를 레고 블록 부품처럼 끼워 넣는 완전히 다른 방식인"}, {"start": 539.4, "end": 542.04, "text": "컴포넌트 설계 방식이 꼭 필요한 겁니다."}, {"start": 542.04, "end": 547.0, "text": "상속이 만능이 아니기 때문에 조립식 부품 관계도 만들어진 거군요."}, {"start": 547.0, "end": 551.68, "text": "그럼 지금까지 말한 이 복잡한 설계도, 속성, 행동, 관계들을"}, {"start": 551.68, "end": 556.16, "text": "프로그래머에게 전달하려면 대체 문서 작업을 어떻게 해야 하는 건가요?"}, {"start": 556.16, "end": 561.1999999999999, "text": "이 복잡한 객체지향 설교를 시각화하는 표준 언어가 UML이며"}, {"start": 561.1999999999999, "end": 564.56, "text": "그중 클래스 다이어그램은 단순한 엑셀표가 아닌"}, {"start": 564.56, "end": 567.64, "text": "완성된 테이블의 작동 방식을 프로그래머에게 전달하는"}, {"start": 567.64, "end": 569.0799999999999, "text": "정교한 설명서입니다."}, {"start": 569.0799999999999, "end": 572.8, "text": "설명서요? 그게 정확히 무슨 말이에요?"}, {"start": 572.8, "end": 577.36, "text": "그냥 기획자가 몬스터 체력이나 공격력 숫자만 깔끔하게"}, {"start": 577.36, "end": 579.7199999999999, "text": "엑셀로 적어주는 거랑 어떻게 다른 거죠?"}, {"start": 579.7199999999999, "end": 582.9599999999999, "text": "고블린을 설계할 때 단순히 체력 같은 속성과"}, {"start": 582.9599999999999, "end": 585.88, "text": "공격 같은 행동만 텍스트로 적는 게 아닙니다."}, {"start": 585.88, "end": 591.56, "text": "최소 레벨은 1에서 최대 20이라는 중가로 형제에 명확한 제약을 걸어두고요."}, {"start": 591.56, "end": 593.36, "text": "네, 조건이 붙는 거군요."}, {"start": 593.36, "end": 597.36, "text": "게다가, 절앱 유저용으로 무조건 3마리에서 5마리씩"}, {"start": 597.36, "end": 600.24, "text": "떼지어 스펀 되게 하라는 책임을 부여합니다."}, {"start": 600.24, "end": 604.16, "text": "심지어 포스트잇 형태의 노트를 붙여서 도망 행동에 대한"}, {"start": 604.16, "end": 607.16, "text": "알고리즘 메모까지 한 런해 볼 수 있게 시각화하죠."}, {"start": 607.16, "end": 611.04, "text": "아, 기획자의 머릿속에 있는 추상적이고 복잡한 세계가"}, {"start": 611.04, "end": 614.48, "text": "프로그래머의 손끝에서 단 1%의 오차도 없이"}, {"start": 614.48, "end": 619.4, "text": "구현될 수 있도록 만드는 완벽한 번역기이자 소통도구였군요."}, {"start": 619.4, "end": 620.64, "text": "네, 바로 그겁니다."}, {"start": 622.88, "end": 628.04, "text": "자, 어느덧 베테란 기획자의 강의 노트 마지막 장을 덮을 시간이 되었습니다."}, {"start": 628.04, "end": 633.2, "text": "오늘 여러분과 함께한 이 짜릿한 심층 탐구의 여정을 잠시 되짚어 볼까요?"}, {"start": 633.2, "end": 634.16, "text": "좋죠."}, {"start": 634.16, "end": 640.28, "text": "우리는 너무 복잡한 현실을 내 목적에 딱 맞게 덜어내는 추상화를 거쳐"}, {"start": 640.28, "end": 642.76, "text": "클래스라는 설계도를 만들었습니다."}, {"start": 642.76, "end": 646.72, "text": "그리고 그 안에 속성과 행동을 캡슐화하여 보호하고"}, {"start": 646.72, "end": 650.04, "text": "반복되는 막일은 상속으로 해결하는 법을 배웠죠?"}, {"start": 650.04, "end": 651.72, "text": "아주 정확하게 요약하셨네요."}, {"start": 651.72, "end": 656.96, "text": "그렇게 탄생한 독립된 객체들이 서로 메시지를 주고받으며 연관을 맺어"}, {"start": 656.96, "end": 659.76, "text": "하나의 거대한 세계를 조립해냅니다."}, {"start": 659.76, "end": 663.64, "text": "마지막으로 이 마법을 현실의 프로그래머가 이해할 수 있도록"}, {"start": 663.64, "end": 667.6, "text": "UML 다이어그램으로 번역해내는 노하우까지 살펴봤습니다."}, {"start": 667.6, "end": 670.08, "text": "우리가 게임 기획 이론으로 시작하긴 했지만"}, {"start": 670.08, "end": 673.6800000000001, "text": "가만히 보면 이건 단순히 게임 개발자만의 이야기가 아닙니다."}, {"start": 673.6800000000001, "end": 676.84, "text": "복잡한 문제를 독립적인 객체 단위로 쪼개고"}, {"start": 676.84, "end": 678.88, "text": "불필요한 것을 과감히 쳐내고"}, {"start": 678.88, "end": 681.76, "text": "각자의 역할에만 집중하게 만드는 이 방식"}, {"start": 681.76, "end": 684.0, "text": "네. 굉장히 철학적이기도 해요."}, {"start": 684.0, "end": 688.36, "text": "맞습니다. 이건 어쩌면 우리가 현실 세계에 복잡한 문제를 해결하는"}, {"start": 688.36, "end": 691.6800000000001, "text": "가장 효율적인 논리와 완벽하게 맞다이거든요."}, {"start": 691.6800000000001, "end": 696.88, "text": "맞습니다. 그래서 마지막으로 이 심증 탐구를 끝까지 함께 해주신 여러분에게"}, {"start": 696.96, "end": 701.06, "text": "도발적인 질문을 하나 던지며 오늘의 시간을 마무리하고자 합니다."}, {"start": 701.06, "end": 705.16, "text": "우리가 일하는 회사 조직이나 얼치고 설킨 복잡한 인간관계도"}, {"start": 705.16, "end": 708.68, "text": "이 객체 지향 설계의 시각으로 바라본다면 어떨까요?"}, {"start": 708.68, "end": 712.8, "text": "만약 당신의 삶을 하나의 거대한 클래스 다이어그램으로 그린다면"}, {"start": 712.8, "end": 717.6, "text": "당신은 지금 세상 속에서 어떤 속성은 캡슐하여 꽁꽁 숨기고 있고"}, {"start": 717.6, "end": 721.6, "text": "어떤 메시지를 타인과 주고받으며 연관성을 맺고 있나요?"}, {"start": 721.6, "end": 724.16, "text": "한번 깊이 고민해 보시길 바랍니다."}, {"start": 724.16, "end": 726.32, "text": "오늘의 심증 탐구는 여기까지입니다."}, {"start": 726.32, "end": 727.72, "text": "함께해 주셔서 감사합니다."}];

let currentSlide = 0;
let isAutoSync = true;
let lastSubIdx = -1;
const audio = document.getElementById('audio');
const playBtn = document.getElementById('play-btn');
const timeDisplay = document.getElementById('time-display');
const seekBar = document.getElementById('seek-bar');

// 오디오 포함 슬라이드를 시작시간 순으로 정렬한 인덱스 (동기화용)
const audioSlides = SLIDES
    .map((s, i) => ({idx: i, start: s.start, end: s.end, hasAudio: s.hasAudio}))
    .filter(s => s.hasAudio && s.start !== null)
    .sort((a, b) => a.start - b.start);

function init() {
    buildNav();
    buildIndex();
    buildAudioMap();
    showSlide(0);
    audio.addEventListener('timeupdate', onTimeUpdate);
    // 오디오 메타데이터 로드 시 시크바 max 갱신
    audio.addEventListener('loadedmetadata', updateSeekBarMax);
    audio.addEventListener('durationchange', updateSeekBarMax);
    // canplay 이벤트도 대비 (일부 브라우저/포맷에서 loadedmetadata가 늦게 발생)
    audio.addEventListener('canplay', updateSeekBarMax);
    // 슬라이더 드래그 시: 오디오 위치 이동 + 즉시 슬라이드 동기화
    seekBar.addEventListener('input', () => {
        audio.currentTime = seekBar.value;
        isAutoSync = true;
        syncSlideToTime(audio.currentTime);
        updateSubtitle(audio.currentTime);
    });
    // 일시정지 상태에서 seek 완료 시에도 슬라이드 동기화
    audio.addEventListener('seeked', () => {
        syncSlideToTime(audio.currentTime);
        updateTimeDisplay();
        updateSubtitle(audio.currentTime);
    });
}

function updateSeekBarMax() {
    if (audio.duration && isFinite(audio.duration)) {
        seekBar.max = audio.duration;
        updateTimeDisplay();
    }
}

function buildNav() {
    const nav = document.getElementById('slide-nav');
    SLIDES.forEach((slide, i) => {
        const dot = document.createElement('button');
        dot.className = 'nav-dot ' + (slide.hasAudio ? 'has-audio' : 'no-audio');
        dot.textContent = slide.id.replace('P', '');
        dot.title = slide.id + ' — ' + slide.title;
        dot.onclick = () => { isAutoSync = false; showSlide(i); };
        nav.appendChild(dot);
    });
}

function buildIndex() {
    const list = document.getElementById('index-list');
    SLIDES.forEach((slide, i) => {
        const item = document.createElement('div');
        item.className = 'index-item' + (slide.hasAudio ? ' has-audio' : '');
        item.innerHTML = '<span class="idx-id">' + slide.id + '</span><span class="idx-title">' + slide.title + '</span>';
        item.onclick = () => { isAutoSync = false; showSlide(i); };
        list.appendChild(item);
    });
}

function buildAudioMap() {
    const map = document.getElementById('audio-map');
    if (!map) return;
    let prevEnd = 0;
    audioSlides.forEach((s, i) => {
        const slide = SLIDES[s.idx];
        const duration = s.end - s.start;
        // 시간 갭이 있으면 빈 공간 삽입
        if (s.start > prevEnd + 1) {
            const gap = document.createElement('div');
            gap.className = 'map-gap';
            gap.style.flexGrow = (s.start - prevEnd).toFixed(1);
            map.appendChild(gap);
        }
        const seg = document.createElement('div');
        seg.className = 'map-segment';
        seg.dataset.idx = s.idx;
        seg.style.flexGrow = duration.toFixed(1);
        seg.textContent = slide.id;
        seg.title = slide.id + ' — ' + slide.title;
        seg.onclick = () => {
            audio.currentTime = s.start;
            isAutoSync = true;
            syncSlideToTime(s.start);
        };
        map.appendChild(seg);
        prevEnd = s.end;
    });
}

function updateAudioMap(currentIdx) {
    document.querySelectorAll('.map-segment').forEach(seg => {
        seg.classList.toggle('active', parseInt(seg.dataset.idx) === currentIdx);
    });
}

function showSlide(index) {
    if (index < 0 || index >= SLIDES.length) return;
    currentSlide = index;
    const slide = SLIDES[index];
    document.getElementById('slide-id').textContent = slide.id;
    document.getElementById('slide-title').textContent = slide.title;
    const contentEl = document.getElementById('slide-content');
    contentEl.style.animation = 'none';
    contentEl.offsetHeight; // 리플로우 트리거
    contentEl.style.animation = '';
    contentEl.innerHTML = slide.content;
    const badge = document.getElementById('slide-badge');
    if (slide.hasAudio) {
        badge.textContent = '🎵 오디오 포함';
        badge.className = 'badge-audio';
    } else {
        badge.textContent = '📖 교안 전용';
        badge.className = 'badge-no-audio';
    }
    // 네비게이션 도트 활성화
    document.querySelectorAll('.nav-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === index);
    });
    // 인덱스 패널 활성화
    document.querySelectorAll('.index-item').forEach((item, i) => {
        item.classList.toggle('active', i === index);
        if (i === index) item.scrollIntoView({block: 'nearest', behavior: 'smooth'});
    });
    // 오디오 맵 활성화
    updateAudioMap(index);

    window.scrollTo({top: 0, behavior: 'smooth'});
}

// 시간 기반 슬라이드 동기화 (정렬된 audioSlides 사용)
function syncSlideToTime(t) {
    let targetIdx = -1;
    for (let i = audioSlides.length - 1; i >= 0; i--) {
        if (t >= audioSlides[i].start) {
            targetIdx = audioSlides[i].idx;
            break;
        }
    }
    if (targetIdx >= 0 && targetIdx !== currentSlide) {
        showSlide(targetIdx);
    }
}

function onTimeUpdate() {
    const t = audio.currentTime;
    seekBar.value = t;
    updateTimeDisplay();
    updateSubtitle(t);
    if (!isAutoSync) return;
    syncSlideToTime(t);
}

function updateTimeDisplay() {
    const cur = formatTime(audio.currentTime);
    const dur = formatTime(audio.duration || 0);
    timeDisplay.textContent = cur + ' / ' + dur;
}

function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
}

function togglePlay() {
    if (audio.paused) {
        audio.play();
        playBtn.textContent = '⏸';
        isAutoSync = true;
    } else {
        audio.pause();
        playBtn.textContent = '▶';
    }
}

function changeSpeed(val) {
    audio.playbackRate = parseFloat(val);
}

function skipTime(sec) {
    audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + sec));
}

document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    if (e.code === 'ArrowLeft') { showSlide(currentSlide - 1); isAutoSync = false; }
    if (e.code === 'ArrowRight') { showSlide(currentSlide + 1); isAutoSync = false; }
});

function updateSubtitle(t) {
    if (typeof TRANSCRIPT === 'undefined' || TRANSCRIPT.length === 0) return;
    const idx = findTranscriptIdx(t);
    if (idx === lastSubIdx) return;
    lastSubIdx = idx;
    const el = document.getElementById('subtitle-text');
    if (el) el.textContent = idx >= 0 ? TRANSCRIPT[idx].text : '';
}

function findTranscriptIdx(t) {
    let lo = 0, hi = TRANSCRIPT.length - 1, result = -1;
    while (lo <= hi) {
        const mid = (lo + hi) >> 1;
        if (TRANSCRIPT[mid].start <= t) { result = mid; lo = mid + 1; }
        else { hi = mid - 1; }
    }
    if (result >= 0 && t <= TRANSCRIPT[result].end) return result;
    return -1;
}

init();
// 모바일 목차 오버레이
function buildOverlayIndex() {
    const list = document.getElementById('index-overlay-list');
    if (!list) return;
    SLIDES.forEach((slide, i) => {
        const item = document.createElement('div');
        item.className = 'index-item' + (slide.hasAudio ? ' has-audio' : '');
        item.innerHTML = '<span class="idx-id">' + slide.id + '</span><span class="idx-title">' + slide.title + '</span>';
        item.onclick = () => { isAutoSync = false; showSlide(i); closeOverlay(); };
        list.appendChild(item);
    });
}

function openOverlay() {
    const ov = document.getElementById('index-overlay');
    ov.classList.add('open');
    const items = document.querySelectorAll('#index-overlay-list .index-item');
    items.forEach((item, i) => {
        item.classList.toggle('active', i === currentSlide);
        if (i === currentSlide) item.scrollIntoView({block: 'center', behavior: 'smooth'});
    });
}

function closeOverlay() {
    document.getElementById('index-overlay').classList.remove('open');
}

buildOverlayIndex();

</script>
